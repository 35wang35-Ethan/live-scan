<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播選品掃描</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; padding: 16px; }
  h2 { font-size: 18px; font-weight: 500; margin-bottom: 16px; color: #222; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #e8e8e8; }
  .result-box { background: #f0f7ff; border-radius: 8px; padding: 10px 14px; margin-top: 10px; display: none; }
  .result-label { font-size: 12px; color: #888; }
  .result-code { font-family: monospace; font-size: 15px; font-weight: 600; color: #222; margin-top: 2px; }
  .field { margin-top: 10px; }
  .field label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  .field input { width: 100%; height: 40px; border: 1px solid #ddd; border-radius: 8px; padding: 0 12px; font-size: 15px; background: #fff; }
  .field input:focus { outline: none; border-color: #378add; }
  .btn { width: 100%; height: 48px; border-radius: 8px; border: none; font-size: 16px; cursor: pointer; margin-top: 10px; font-weight: 500; }
  .btn-scan { background: #f0f0f0; color: #333; }
  .btn-add { background: #222; color: #fff; }
  .btn:active { transform: scale(0.98); }
  .btn-disabled { opacity: 0.5; pointer-events: none; }
  .preview-img { width: 100%; border-radius: 8px; margin-top: 10px; display: none; max-height: 200px; object-fit: contain; }
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .metric { background: #f7f7f7; border-radius: 8px; padding: 10px; text-align: center; }
  .metric-label { font-size: 11px; color: #888; }
  .metric-value { font-size: 22px; font-weight: 600; color: #222; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 400px; }
  th { text-align: left; padding: 8px; color: #888; font-weight: 500; border-bottom: 1px solid #f0f0f0; }
  td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; color: #333; }
  tr:last-child td { border-bottom: none; }
  .del-btn { background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
  .del-btn:active { background: #fff0f0; color: #c0392b; }
  .empty { text-align: center; padding: 24px; color: #bbb; font-size: 13px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 99; }
  .toast.show { opacity: 1; }
  .hint { font-size: 12px; color: #aaa; text-align: center; margin-top: 8px; }
  .divider { border-top: 1px solid #f0f0f0; margin-top: 16px; padding-top: 16px; }
</style>
</head>
<body>

<h2>直播選品掃描</h2>

<div class="card">
  <div class="result-label" style="margin-bottom:8px">步驟 1：掃描條碼</div>
  <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleImage(this)">
  <button class="btn btn-scan" id="scan-btn" onclick="document.getElementById('file-input').click()">拍照掃描條碼</button>
  <p class="hint">拍照時讓條碼佔畫面一半以上，效果最好</p>
  <img id="preview-img" class="preview-img" />
  <div class="result-box" id="result-box">
    <div class="result-label">掃描到的條碼</div>
    <div class="result-code" id="result-code">—</div>
  </div>
  <div class="field" style="margin-top:16px">
    <label>或手動輸入條碼</label>
    <input type="text" id="inp-barcode-manual" placeholder="例：4710742716980" oninput="useManual(this.value)" />
  </div>
  <div class="divider">
    <div class="result-label" style="margin-bottom:8px">步驟 2：填寫資料</div>
    <div class="field">
      <label>你的名字</label>
      <input type="text" id="inp-staff" placeholder="例：小明" />
    </div>
    <div class="field">
      <label>數量</label>
      <input type="number" id="inp-qty" placeholder="輸入數量" min="1" />
    </div>
    <div class="field">
      <label>備註（選填）</label>
      <input type="text" id="inp-note" placeholder="例：白色短襪" />
    </div>
    <button class="btn btn-add" onclick="addItem()">加入清單</button>
  </div>
</div>

<div class="summary">
  <div class="metric"><div class="metric-label">商品種類</div><div class="metric-value" id="stat-kinds">0</div></div>
  <div class="metric"><div class="metric-label">總件數</div><div class="metric-value" id="stat-total">0</div></div>
  <div class="metric"><div class="metric-label">筆數</div><div class="metric-value" id="stat-rows">0</div></div>
</div>

<div class="card">
  <div class="result-label" style="margin-bottom:12px">即時清單（所有人）</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>時間</th><th>條碼</th><th>備註</th><th style="text-align:right">數量</th><th>員工</th><th></th></tr></thead>
      <tbody id="table-body"><tr><td colspan="6" class="empty">尚未有資料</td></tr></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx3e5Q7BZRhHG0IwdmF2y4-fz64kT-3EKXO_5870UUoTIp7j4Bg9GnzHUwa6xWspANApw/exec';
let currentBarcode = '';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function useManual(val) {
  currentBarcode = val.trim();
  if (currentBarcode) {
    document.getElementById('result-code').textContent = currentBarcode;
    document.getElementById('result-box').style.display = 'block';
  }
}

function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const img = document.getElementById('preview-img');
  img.src = url;
  img.style.display = 'block';
  const btn = document.getElementById('scan-btn');
  btn.textContent = '辨識中...';
  btn.classList.add('btn-disabled');
  showToast('辨識中...');

  Quagga.decodeSingle({
    decoder: {
      readers: ['ean_reader', 'ean_8_reader', 'code_128_reader', 'code_39_reader', 'upc_reader', 'upc_e_reader']
    },
    locate: true,
    src: url
  }, function(result) {
    btn.textContent = '拍照掃描條碼';
    btn.classList.remove('btn-disabled');
    input.value = '';
    if (result && result.codeResult) {
      setBarcode(result.codeResult.code);
    } else {
      showToast('辨識失敗，請重拍或手動輸入');
    }
  });
}

function setBarcode(code) {
  currentBarcode = code;
  document.getElementById('result-code').textContent = code;
  document.getElementById('result-box').style.display = 'block';
  document.getElementById('inp-barcode-manual').value = code;
  document.getElementById('inp-qty').focus();
  showToast('掃描成功：' + code);
}

async function addItem() {
  const barcode = currentBarcode;
  const qty = parseInt(document.getElementById('inp-qty').value);
  const note = document.getElementById('inp-note').value.trim();
  const staff = document.getElementById('inp-staff').value.trim();
  if (!barcode) { showToast('請先掃描或輸入條碼'); return; }
  if (!qty || qty < 1) { showToast('請輸入有效數量'); return; }
  if (!staff) { showToast('請輸入你的名字'); return; }
  showToast('儲存中...');
  try {
    await fetch(GAS_URL + '?action=add&barcode=' + encodeURIComponent(barcode) + '&note=' + encodeURIComponent(note) + '&qty=' + qty + '&staff=' + encodeURIComponent(staff), { mode: 'no-cors' });
    showToast('已加入清單！');
    document.getElementById('inp-qty').value = '';
    document.getElementById('inp-note').value = '';
    document.getElementById('inp-barcode-manual').value = '';
    currentBarcode = '';
    document.getElementById('result-code').textContent = '—';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('preview-img').style.display = 'none';
    loadItems();
  } catch(e) { showToast('儲存失敗，請重試'); }
}

async function deleteRow(rowIndex) {
  if (!confirm('確定要刪除這筆資料嗎？')) return;
  showToast('刪除中...');
  try {
    await fetch(GAS_URL + '?action=delete&row=' + rowIndex, { mode: 'no-cors' });
    showToast('已刪除！');
    loadItems();
  } catch(e) { showToast('刪除失敗，請重試'); }
}

async function loadItems() {
  try {
    const res = await fetch(GAS_URL + '?action=get');
    const allRows = await res.json();
    const tbody = document.getElementById('table-body');
    if (!allRows || allRows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">尚未有資料</td></tr>';
      updateStats([]); return;
    }
    tbody.innerHTML = [...allRows].reverse().map((r, i) => {
      const realIndex = allRows.length - i + 1;
      return `<tr>
        <td style="font-size:11px;color:#aaa">${String(r[0]).substring(5,16)}</td>
        <td><span style="font-family:monospace;font-size:12px">${r[1]}</span></td>
        <td style="color:#888;font-size:12px">${r[2] || '—'}</td>
        <td style="text-align:right;font-weight:600">${r[3]}</td>
        <td style="font-size:12px;color:#888">${r[4]}</td>
        <td><button class="del-btn" onclick="deleteRow(${realIndex})">✕</button></td>
      </tr>`;
    }).join('');
    updateStats(allRows);
  } catch(e) {}
}

function updateStats(rows) {
  const barcodes = new Set(rows.map(r => r[1]));
  const total = rows.reduce((s, r) => s + Number(r[3]), 0);
  document.getElementById('stat-kinds').textContent = barcodes.size;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-rows').textContent = rows.length;
}

loadItems();
setInterval(loadItems, 10000);
</script>
</body>
</html>
