<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播選品掃描</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f5; padding: 16px; }
  h2 { font-size: 18px; font-weight: 500; margin-bottom: 16px; color: #222; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; border: 1px solid #e8e8e8; }
  .scan-area { position: relative; width: 100%; border-radius: 8px; overflow: hidden; background: #000; aspect-ratio: 4/3; }
  #preview { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-frame { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .scan-frame-inner { width: 70%; height: 40%; border: 2px solid rgba(255,255,255,0.7); border-radius: 8px; }
  .scan-line { position: absolute; left: 15%; right: 15%; height: 2px; background: #e24b4a; top: 50%; opacity: 0; animation: scan 1.8s ease-in-out infinite; }
  .scan-line.active { opacity: 1; }
  @keyframes scan { 0%,100%{top:30%} 50%{top:70%} }
  .result-box { background: #f0f7ff; border-radius: 8px; padding: 10px 14px; margin-top: 10px; display: none; }
  .result-label { font-size: 12px; color: #888; }
  .result-code { font-family: monospace; font-size: 15px; font-weight: 600; color: #222; }
  .field { margin-top: 10px; }
  .field label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
  .field input { width: 100%; height: 40px; border: 1px solid #ddd; border-radius: 8px; padding: 0 12px; font-size: 15px; background: #fff; }
  .field input:focus { outline: none; border-color: #378add; }
  .btn { width: 100%; height: 44px; border-radius: 8px; border: none; font-size: 15px; cursor: pointer; margin-top: 10px; }
  .btn-cam { background: #f0f0f0; color: #333; }
  .btn-add { background: #222; color: #fff; }
  .btn:active { transform: scale(0.98); }
  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .metric { background: #f7f7f7; border-radius: 8px; padding: 10px; text-align: center; }
  .metric-label { font-size: 11px; color: #888; }
  .metric-value { font-size: 22px; font-weight: 600; color: #222; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px; color: #888; font-weight: 500; border-bottom: 1px solid #f0f0f0; }
  td { padding: 10px 8px; border-bottom: 1px solid #f0f0f0; color: #333; }
  tr:last-child td { border-bottom: none; }
  .empty { text-align: center; padding: 24px; color: #bbb; font-size: 13px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .status { font-size: 13px; color: #888; margin-bottom: 10px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-right: 6px; }
  .dot.active { background: #1d9e75; }
</style>
</head>
<body>

<h2>直播選品掃描</h2>

<div class="card">
  <div class="status"><span class="dot" id="dot"></span><span id="status-text">相機未開啟</span></div>
  <div class="scan-area">
    <video id="preview" autoplay playsinline muted></video>
    <div class="scan-frame"><div class="scan-frame-inner"></div></div>
    <div class="scan-line" id="scan-line"></div>
  </div>
  <button class="btn btn-cam" id="cam-btn" onclick="toggleCamera()">開啟相機掃描條碼</button>
  <div class="result-box" id="result-box">
    <div class="result-label">掃描到的條碼</div>
    <div class="result-code" id="result-code">—</div>
  </div>
  <div class="field">
    <label>你的名字</label>
    <input type="text" id="inp-staff" placeholder="例：小明" />
  </div>
  <div class="field">
    <label>數量</label>
    <input type="number" id="inp-qty" placeholder="輸入數量" min="1" />
  </div>
  <div class="field">
    <label>備註（選填）</label>
    <input type="text" id="inp-note" placeholder="例：白色短襪" />
  </div>
  <button class="btn btn-add" onclick="addItem()">加入清單</button>
</div>

<div class="summary">
  <div class="metric"><div class="metric-label">商品種類</div><div class="metric-value" id="stat-kinds">0</div></div>
  <div class="metric"><div class="metric-label">總件數</div><div class="metric-value" id="stat-total">0</div></div>
  <div class="metric"><div class="metric-label">筆數</div><div class="metric-value" id="stat-rows">0</div></div>
</div>

<div class="card">
  <div class="result-label" style="margin-bottom:12px">即時清單（所有人）</div>
  <table>
    <thead><tr><th>時間</th><th>條碼</th><th>備註</th><th style="text-align:right">數量</th><th>員工</th></tr></thead>
    <tbody id="table-body"><tr><td colspan="5" class="empty">尚未有資料</td></tr></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx3e5Q7BZRhHG0IwdmF2y4-fz64kT-3EKXO_5870UUoTIp7j4Bg9GnzHUwa6xWspANApw/exec';

let scanning = false, stream = null, detector = null, scanLoop = null;
let currentBarcode = '', scanCooldown = false;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function toggleCamera() {
  scanning ? stopCamera() : startCamera();
}

async function startCamera() {
  try {
    if (!('BarcodeDetector' in window)) {
      showToast('此瀏覽器不支援掃描，請更新 iOS');
      return;
    }
    detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'upc_a', 'upc_e'] });
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } } });
    const video = document.getElementById('preview');
    video.srcObject = stream;
    await video.play();
    scanning = true;
    document.getElementById('cam-btn').textContent = '關閉相機';
    document.getElementById('dot').classList.add('active');
    document.getElementById('status-text').textContent = '掃描中，請將條碼對準框內';
    document.getElementById('scan-line').classList.add('active');
    scanLoop = setInterval(async () => {
      if (!scanning || scanCooldown) return;
      try {
        const barcodes = await detector.detect(video);
        if (barcodes.length > 0) {
          const code = barcodes[0].rawValue;
          currentBarcode = code;
          document.getElementById('result-code').textContent = code;
          document.getElementById('result-box').style.display = 'block';
          document.getElementById('status-text').textContent = '條碼已讀取，請輸入數量';
          document.getElementById('inp-qty').focus();
          scanCooldown = true;
          showToast('掃描成功：' + code);
          setTimeout(() => { scanCooldown = false; }, 3000);
        }
      } catch(e) {}
    }, 300);
  } catch(e) {
    showToast('無法開啟相機：' + e.message);
  }
}

function stopCamera() {
  clearInterval(scanLoop);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null; scanning = false;
  document.getElementById('preview').srcObject = null;
  document.getElementById('cam-btn').textContent = '開啟相機掃描條碼';
  document.getElementById('dot').classList.remove('active');
  document.getElementById('status-text').textContent = '相機未開啟';
  document.getElementById('scan-line').classList.remove('active');
}

async function addItem() {
  const barcode = currentBarcode;
  const qty = parseInt(document.getElementById('inp-qty').value);
  const note = document.getElementById('inp-note').value.trim();
  const staff = document.getElementById('inp-staff').value.trim();
  if (!barcode) { showToast('請先掃描條碼'); return; }
  if (!qty || qty < 1) { showToast('請輸入有效數量'); return; }
  if (!staff) { showToast('請輸入你的名字'); return; }
  showToast('儲存中...');
  try {
    await fetch(GAS_URL + '?action=add&barcode=' + encodeURIComponent(barcode) + '&note=' + encodeURIComponent(note) + '&qty=' + qty + '&staff=' + encodeURIComponent(staff), { mode: 'no-cors' });
    showToast('已加入清單！');
    document.getElementById('inp-qty').value = '';
    document.getElementById('inp-note').value = '';
    currentBarcode = '';
    document.getElementById('result-code').textContent = '—';
    document.getElementById('result-box').style.display = 'none';
    scanCooldown = false;
    document.getElementById('status-text').textContent = scanning ? '掃描中，請將條碼對準框內' : '相機未開啟';
    loadItems();
  } catch(e) { showToast('儲存失敗，請重試'); }
}

async function loadItems() {
  try {
    const res = await fetch(GAS_URL + '?action=get');
    const rows = await res.json();
    const tbody = document.getElementById('table-body');
    if (!rows || rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">尚未有資料</td></tr>';
      updateStats([]); return;
    }
    tbody.innerHTML = [...rows].reverse().map(r => `
      <tr>
        <td style="font-size:11px;color:#aaa">${String(r[0]).substring(5,16)}</td>
        <td><span style="font-family:monospace;font-size:12px">${r[1]}</span></td>
        <td style="color:#888;font-size:12px">${r[2] || '—'}</td>
        <td style="text-align:right;font-weight:600">${r[3]}</td>
        <td style="font-size:12px;color:#888">${r[4]}</td>
      </tr>`).join('');
    updateStats(rows);
  } catch(e) {}
}

function updateStats(rows) {
  const barcodes = new Set(rows.map(r => r[1]));
  const total = rows.reduce((s, r) => s + Number(r[3]), 0);
  document.getElementById('stat-kinds').textContent = barcodes.size;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-rows').textContent = rows.length;
}

loadItems();
setInterval(loadItems, 10000);
</script>
</body>
</html>
